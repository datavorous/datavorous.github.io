<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JEE Habit Tracker</title>
  <link rel="stylesheet" href="index.css">
  <script defer src="index.js"></script>
  <style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200&display=swap');
</style>
</head>

<body>
  <h1>Tracker</h1>
  <h2>Questions Done Today</h2>
  <label for="phy">Phy:</label>
  <input type="number" id="phy" min="0">
  <br>
  <label for="chem">Chem:</label>
  <input type="number" id="chem" min="0">
  <br>
  <label for="math">Math:</label>
  <input type="number" id="math" min="0">
  <br>
  <label for="topics">Topics Covered:</label>
  <input type="text" id="topics" placeholder="Enter topics covered">
  <br>
  <button onclick="trackQuestions()">Track</button>

  <br> <br>


<button onclick="calculateStatistics()">Show Statistics</button>

<div id="statisticsContainer"></div>

  <h2>Retrospective Table</h2>
<div class="container">
  <table id="retrospectiveTable">
    <tr>
      <th>Date</th>
      <th>Physics</th>
      <th>Chemistry</th>
      <th>Mathematics</th>
      <th>Topics Covered</th>
      <th>Action</th>
    </tr>
  </table>
</div>
  <script src="index.js"></script>
</body>
</html>
